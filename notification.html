<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notification</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
        height: 100%;
        justify-content: flex-end;
        align-items: flex-end;
      }
      .toast {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 24px 12px 12px;
        border-radius: 8px;
        background: #ffffff;
        border: 1px solid rgba(200, 200, 200, 0.9);
        max-width: 360px;
        min-width: 240px;
        opacity: 0;
        transition: opacity 0.3s ease-out;
      }
      .toast.visible {
        opacity: 1;
      }
      .toast-icon {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
      }
      .toast-content {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .toast-title {
        font-weight: 600;
        font-size: 14px;
        color: #1a1a1a;
      }
      .toast-message {
        font-size: 13px;
        color: #4a4a4a;
      }
    </style>
  </head>
  <body>
    <div class="stack" id="stack"></div>
    <script>
      var ICON_COLORS = {
        success: "#43803e",
        error: "#c94a4a",
        info: "#6A7D93",
        warning: "#b8860b"
      };
      var ICON_PATHS = {
        success: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
        error: '<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>',
        info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
        warning: '<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>'
      };
      var DURATIONS = {
        success: 2000,
        error: 4000,
        info: 2000,
        warning: 3000
      };
      var ITEM_HEIGHT = 64;
      var ITEM_GAP = 8;
      var ENTRANCE_STAGGER = 80;
      var REMOVAL_STAGGER = 300;
      var stack = document.getElementById("stack");

      var registry = {};
      var draining = false;
      var removalQueue = [];
      var removalTimer = null;
      var resizeTimer = null;

      function activeCount() {
        var n = 0;
        var ids = Object.keys(registry);
        for (var i = 0; i < ids.length; i++) {
          var s = registry[ids[i]].state;
          if (s === "entering" || s === "visible") n++;
        }
        return n;
      }

      function createToastElement(level, title, message) {
        var el = document.createElement("div");
        el.className = "toast";
        el.innerHTML =
          '<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="' + ICON_COLORS[level] + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + ICON_PATHS[level] + '</svg>' +
          '<div class="toast-content">' +
            '<span class="toast-title">' + escapeHtml(title) + '</span>' +
            (message ? '<span class="toast-message">' + escapeHtml(message) + '</span>' : '') +
          '</div>';
        return el;
      }

      function escapeHtml(str) {
        var d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
      }

      function cleanupZombies() {
        var ids = Object.keys(registry);
        for (var i = 0; i < ids.length; i++) {
          var entry = registry[ids[i]];
          if (entry.state === "exiting" || entry.state === "removed") {
            if (entry.timerId) clearTimeout(entry.timerId);
            if (entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
            delete registry[ids[i]];
          }
        }
      }

      function fadeIn(el) {
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            el.classList.add("visible");
          });
        });
      }

      function scheduleDismissal(id, level) {
        var duration = DURATIONS[level] || 2000;
        var timerId = setTimeout(function() {
          queueRemoval(id);
        }, duration);
        if (registry[id]) registry[id].timerId = timerId;
      }

      function queueRemoval(id) {
        if (!registry[id] || registry[id].state !== "visible") return;
        removalQueue.push(id);
        if (!removalTimer) processRemovalQueue();
      }

      function processRemovalQueue() {
        if (removalQueue.length === 0) {
          removalTimer = null;
          return;
        }
        var id = removalQueue.shift();
        removeNotification(id);
        removalTimer = setTimeout(processRemovalQueue, REMOVAL_STAGGER);
      }

      function removeNotification(id) {
        var entry = registry[id];
        if (!entry || entry.state === "exiting" || entry.state === "removed") return;
        entry.state = "exiting";
        if (entry.timerId) {
          clearTimeout(entry.timerId);
          entry.timerId = null;
        }
        entry.el.classList.remove("visible");

        var cleaned = false;
        function cleanup() {
          if (cleaned) return;
          cleaned = true;
          if (entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
          delete registry[id];
          debouncedResize();
        }
        entry.el.addEventListener("transitionend", cleanup, { once: true });
        setTimeout(cleanup, 500);
      }

      function debouncedResize() {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          resizeTimer = null;
          updateWindow(activeCount());
        }, 50);
      }

      function updateWindow(n) {
        var height = n > 0 ? n * ITEM_HEIGHT + (n - 1) * ITEM_GAP + 20 : 0;
        if (window.__TAURI__) {
          return window.__TAURI__.core.invoke("update_notification_window", {
            count: n,
            height: Math.ceil(height)
          });
        }
        return Promise.resolve();
      }

      function drainPending() {
        if (!window.__TAURI__ || draining) return;
        draining = true;
        window.__TAURI__.core.invoke("drain_pending_notifications").then(function(pending) {
          if (pending.length === 0) {
            draining = false;
            return;
          }

          cleanupZombies();

          var entries = [];
          for (var i = 0; i < pending.length; i++) {
            var n = pending[i];
            var el = createToastElement(n.level, n.title, n.message);
            el.dataset.notifId = n.id;
            stack.appendChild(el);
            registry[n.id] = { el: el, timerId: null, state: "entering" };
            entries.push({ id: n.id, level: n.level, el: el });
          }

          updateWindow(activeCount()).then(function() {
            for (var i = 0; i < entries.length; i++) {
              (function(entry, delay) {
                setTimeout(function() {
                  if (!registry[entry.id] || registry[entry.id].state !== "entering") return;
                  fadeIn(entry.el);
                  registry[entry.id].state = "visible";
                  scheduleDismissal(entry.id, entry.level);
                }, delay);
              })(entries[i], i * ENTRANCE_STAGGER);
            }
            draining = false;
          }).catch(function() {
            draining = false;
          });
        }).catch(function() {
          draining = false;
        });
      }

      function init() {
        if (!window.__TAURI__) {
          setTimeout(init, 100);
          return;
        }
        drainPending();
      }

      init();
    </script>
  </body>
</html>
